# =============================================================================
# Faux|Dash Docker Compose
# =============================================================================
#
# QUICK START:
#   1. Copy: cp docker-compose.sample.yml docker-compose.yml
#   2. Start: docker compose up -d
#   3. Access: http://localhost:8080
#
# Complete the setup wizard on first run to create your admin account.
# NEXTAUTH_SECRET is auto-generated on first run if not provided.
#
# All other settings (weather, SMTP, OIDC, Redis, GeoIP) are configured
# through the Admin > Settings UI — no env vars required.
#
# =============================================================================

services:
  app:
    image: ghcr.io/sdenike/fauxdash:latest
    # build: .  # Uncomment to build locally instead

    ports:
      - "8080:8080"

    environment:
      - NODE_ENV=production

      # User/Group ID for volume permissions (run `id` to find yours)
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

      # Your deployment URL — change this if using a reverse proxy or custom domain
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:8080}

      # Optional: Provide your own auth secret (auto-generated and persisted if not set)
      # Generate with: openssl rand -base64 32
      # - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}

      # Optional: Log level (debug, info, warn, error) — default: error
      # - LOG_LEVEL=info

    volumes:
      - fauxdash-data:/data          # SQLite database and settings
      - fauxdash-favicons:/app/public/favicons  # Downloaded favicons
      - fauxdash-logs:/data/logs     # Application logs

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fauxdash-data:
  fauxdash-favicons:
  fauxdash-logs:
